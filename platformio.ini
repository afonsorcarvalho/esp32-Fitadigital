; ESP32-S3-Touch-LCD-4.3B — LVGL 8.3 no LCD (ESP32_Display_Panel).
;
; Base no exemplo oficial PlatformIO v0.2.2:
;   https://github.com/esp-arduino-libs/ESP32_Display_Panel/blob/v0.2.2/examples/PlatformIO/platformio.ini
;
; Waveshare (produto / demos Arduino): https://docs.waveshare.com/ESP32-S3-Touch-LCD-4.3B
; Placa na lib: BOARD_WAVESHARE_ESP32_S3_Touch_LCD_4_3_B → src/ESP_Panel_Board_Supported.h
;
; USB CDC: o manual de uso fala na porta UART para download e log; a tabela Waveshare em
;   board_waveshare.md (ESP32_Display_Panel) indica USB CDC On Boot = Enabled para 4.3B se usar porta USB.
;   Ajuste ARDUINO_USB_CDC_ON_BOOT (0 = UART, 1 = USB CDC) conforme a porta que utilizar.

[env:esp32-s3-touch-lcd-4_3b]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
extra_scripts = post:tools/save_firmware_version.py

platform_packages =
    platformio/framework-arduinoespressif32@https://github.com/espressif/arduino-esp32.git#3.0.3
    platformio/framework-arduinoespressif32-libs@https://github.com/esp-arduino-libs/arduino-esp32-sdk.git#high_perf/v3.0.3

upload_speed = 921600
monitor_speed = 115200
; Garante que programacao e logs usem a mesma porta serial do ESP32.
upload_port = COM3
monitor_port = COM3
; Reduz "Write timeout" / quedas do monitor em alguns conversores USB-serie
monitor_rts = 0
monitor_dtr = 0

board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
; FreeRTOS: trace + run-time stats (vTaskList / vTaskGetRunTimeStats em task_debug.cpp)
board_build.sdkconfig_defaults = sdkconfig.defaults

; Flash já em qio + 80 MHz (board_build). Preferir -O2 ao -Os por default para menos custo em refr desenho LVGL.
build_unflags = -Os

build_flags =
    -O2
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=3
    '-DFITADIGITAL_VERSION="1.36"'
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -Isrc
    -Isrc/fs
    ; SimpleFTPServer: SD (STORAGE_SD=5). Definir NETWORK evita bloco em FtpServerKey.h que repoe FFAT.
    -DDEFAULT_FTP_SERVER_NETWORK_TYPE_ESP32=6
    -DDEFAULT_STORAGE_TYPE_ESP32=5
    ; Timeouts do SimpleFTPServer (documentado em FtpServerKey.h):
    ; "530 Timeout" na autenticacao ocorre com FTP_AUTH_TIME_OUT curto (default 10s).
    -DFTP_AUTH_TIME_OUT=45
    -DFTP_TIME_OUT=600
    ; FatFs: redireciona get_fattime para implementacao local (RTC como fonte de timestamp).
    -Wl,--wrap=get_fattime
    ; AsyncTCP (ESP32Async): recomendacao oficial (README) para reduzir consumo de RAM e evitar
    ; "begin(): failed to start task" (xTaskCreate falha). Tambem fixa o core para o mesmo da app.
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_STACK_SIZE=4096

; Evita símbolos duplicados: cópia local em src/fs (CS via CH422G).
lib_ignore =
    SD

; deep+ falha a encontrar Network.h com Arduino-ESP32 3.x (WiFi); ver arduino-esp32#9782
lib_ldf_mode = deep
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git#v0.2.2
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git#v0.1.0
    https://github.com/lvgl/lvgl.git#release/v8.3
    ; Regressao observada na listagem FTP com v3.0.2 (LIST/dir muito lentos e quedas de conexao).
    ; Mantemos v2.1.10 (comportamento estavel medido em runtime) ate validar migracao.
    https://github.com/xreef/SimpleFTPServer.git#v2.1.10
    ; WireGuard: fork Tinkerforge patched localmente em lib/WireGuard-ESP32 (wg_netif_client_id hardcoded=0).
    ; Nao incluir aqui — PlatformIO usa lib/ automaticamente via lib_ldf_mode=deep.
    WiFi
    ; Portal web (configuracao, logs, ficheiros SD): AsyncWebServer + AsyncTCP + WebSocket.
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer
    ; MQTT assíncrono via AsyncTCP (já presente). Usar MqttClient (não MqttClientNonBlocking).
    bertmelis/espMqttClient @ ^1.7.0
